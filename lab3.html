<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адаптивный Header и Заголовок</title>
<style>
/* --- Header --- */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;

    background: white;
    border-bottom: 1px solid #edf1f8;
    box-sizing: border-box;
    z-index: 1000;
}

/* Логотип */
.logo {
    width: 120px;
    height: auto;
}

/* Кнопка входа */
.sign_in {
    background-color: #edf2fe;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* --- Контейнер для контента --- */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

/* --- Отступ под фиксированным header --- */
main {
    margin-top: 100px; /* высота header */
}

/* --- Заголовок --- */
h1 {
    text-align: center;
    color: #0e5ea8;
    margin: 0;
    padding-top: 5%;
}

/* --- Адаптив для экранов меньше 1600px --- */
@media (max-width:1600px){
    header {
        padding: 15px 40px;
    }
    .logo {
        width: 100px;
    }
    h1 {
        font-size: 28px;
    }
    .sign_in {
        padding: 8px 12px;
    }
}

/* --- Адаптив для экранов меньше 1200px --- */
@media (max-width:1200px){
    header {
        padding: 10px 20px;
        flex-wrap: wrap;
        gap: 10px;
    }
    h1 {
        font-size: 24px;
    }
    .logo {
        width: 90px;
    }
}
</style>
</head>
<body>

<header>
    <img src="logo.png" class="logo" alt="Логотип">
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
    </nav>
    <button class="sign_in">Sign in</button>
</header>

<main>
    <div class="container">
        <h1>Главный заголовок страницы</h1>
    </div>
</main>

</body>
</html>
